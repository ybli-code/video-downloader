<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频下载智能体 - 多平台无水印下载</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>视频下载智能体</h1>
                    <p>多平台 · 无水印 · 高清下载</p>
                </div>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span>在线运行中</span>
            </div>
        </header>

        <!-- 输入区 -->
        <section class="input-section">
            <div class="input-card">
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                    </div>
                    <input type="text" id="urlInput" placeholder="粘贴视频链接，支持 YouTube / TikTok / 抖音 / B站 / Twitter 等..." autocomplete="off">
                    <button id="downloadBtn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>下载</span>
                    </button>
                </div>
                <div id="platformHint" class="platform-hint" style="display:none;">
                    <span class="hint-icon"></span>
                    <span id="platformHintText"></span>
                </div>
            </div>

            <!-- 支持平台 -->
            <div class="platforms-bar">
                <span class="platforms-label">支持平台:</span>
                <div class="platform-chips" id="platformChips"></div>
            </div>
        </section>

        <!-- 下载任务列表 -->
        <section class="tasks-section">
            <div class="section-header">
                <h2>下载任务</h2>
                <div class="section-actions">
                    <span id="taskCount" class="task-count">0 个任务</span>
                </div>
            </div>
            <div id="taskList" class="task-list">
                <div class="empty-state" id="emptyState">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <p>还没有下载任务</p>
                    <p class="empty-sub">在上方输入视频链接开始下载</p>
                </div>
            </div>
        </section>

        <!-- 功能特性 -->
        <section class="features-section">
            <div class="feature-card">
                <div class="feature-icon icon-watermark">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                    </svg>
                </div>
                <h3>无水印下载</h3>
                <p>自动获取原始视频流，下载的视频不含平台水印</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon icon-multi">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <h3>多平台支持</h3>
                <p>支持 YouTube、TikTok、抖音、B站、Twitter 等 12+ 平台</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon icon-hd">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <h3>高清画质</h3>
                <p>自动选择最高可用画质，支持 1080P / 4K 下载</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon icon-batch">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </div>
                <h3>批量下载</h3>
                <p>支持同时提交多个链接，并行下载提高效率</p>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>视频下载智能体 · 基于 yt-dlp 引擎 · 仅供个人学习使用</p>
            <p class="footer-warn">请遵守各平台服务条款及著作权法，下载内容仅供个人存档</p>
        </footer>
    </div>

    <!-- Toast 通知 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
