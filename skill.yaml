# ──────────────────────────────────────────────
# 视频下载技能 - 技能清单
# ──────────────────────────────────────────────

name: video-downloader
version: 1.0.0
category: media/download
language: python
license: MIT

description: |
  多平台无水印视频下载智能体。
  给出视频链接，自动识别平台并下载最高清无水印视频。
  支持手动框选区域去除残留水印。

features:
  - 多平台支持（YouTube / TikTok / 抖音 / B站 / 小红书 / Twitter 等 12+ 平台）
  - 无水印下载（抖音 play_addr、小红书原始 CDN、B站 API 直链）
  - 最高清画质（自动选择最高分辨率+最高码率流）
  - 手动去水印（ffmpeg delogo 滤镜，可视化框选水印区域）
  - Web 界面 + 命令行双模式
  - 实时下载进度（速度、剩余时间、文件大小）
  - 批量下载（多任务并行）
  - 断线恢复（重启后自动恢复已完成任务）

platforms:
  - name: YouTube
    no_watermark: true
    engine: yt-dlp
    max_quality: 8K
    note: 使用 android+web 客户端获取最高清格式
  - name: TikTok
    no_watermark: true
    engine: yt-dlp
    max_quality: 原画
    note: 通过 App API 获取 play_addr 无水印直链
  - name: 抖音
    no_watermark: true
    engine: 自研解析器
    max_quality: 原画
    note: iesdouyin.com 分享页提取 _ROUTER_DATA，按分辨率选最高清流
  - name: B站
    no_watermark: true
    engine: 自研解析器
    max_quality: 4K HDR
    note: 同时请求 durl+DASH 两种格式，自动选更高清
  - name: 小红书
    no_watermark: true
    engine: 自研解析器
    max_quality: 原画
    note: 解析页面提取 sns-video CDN 原始直链
  - name: Twitter/X
    no_watermark: true
    engine: yt-dlp
    max_quality: 原画
  - name: Instagram
    no_watermark: true
    engine: yt-dlp
    max_quality: 原画
    note: 私密内容需提供 Cookie
  - name: 其他
    no_watermark: true
    engine: yt-dlp
    max_quality: 原画
    note: 支持 Facebook / Reddit / Vimeo / Dailymotion / 西瓜视频 / 微博

entry_points:
  web:
    command: python app.py
    port: 5000
    description: 启动 Web 服务（含 API + 界面）
  cli:
    command: python cli.py <URL>
    description: 命令行下载单个视频

api:
  base_url: http://localhost:5000
  endpoints:
    - method: POST
      path: /api/download
      description: 提交下载任务
      body: { url: "视频链接" }
    - method: GET
      path: /api/tasks
      description: 获取所有任务列表
    - method: GET
      path: /api/tasks/{task_id}
      description: 获取单个任务详情
    - method: DELETE
      path: /api/tasks/{task_id}
      description: 删除任务及文件
    - method: GET
      path: /api/download/{task_id}
      description: 下载已完成的视频文件
    - method: POST
      path: /api/tasks/{task_id}/watermark
      description: 去除视频指定区域水印
      body: { x: 0, y: 0, w: 100, h: 50 }
    - method: POST
      path: /api/detect
      description: 检测 URL 对应平台
      body: { url: "视频链接" }
    - method: GET
      path: /api/platforms
      description: 获取支持的平台列表

dependencies:
  python: ">=3.9"
  packages:
    - yt-dlp>=2026.7.4
    - flask>=3.0.0
    - httpx>=0.27.0
  system:
    - ffmpeg（音视频合并与去水印）
    - ffprobe（视频信息检测）

files:
  - path: downloader.py
    description: 核心下载引擎（平台检测 + 多平台下载 + 去水印）
  - path: app.py
    description: Flask Web 服务（RESTful API + Web 界面路由）
  - path: cli.py
    description: 命令行工具
  - path: templates/index.html
    description: Web 界面（暗色主题 + 响应式布局）
  - path: static/style.css
    description: 样式文件（玻璃拟态设计）
  - path: static/app.js
    description: 前端逻辑（实时进度轮询 + 去水印交互）
  - path: requirements.txt
    description: Python 依赖
  - path: start.sh
    description: 一键启动脚本
